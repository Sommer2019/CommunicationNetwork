# HAProxy Konfiguration – Minecraft Seamless Failover
# Dokumentation: https://www.haproxy.org/download/2.9/doc/configuration.txt

#──────────────────────────────────────────────
# Globale Einstellungen
#──────────────────────────────────────────────
global
    log         stdout  format raw  local0
    maxconn     50000
    tune.ssl.default-dh-param 2048

#──────────────────────────────────────────────
# Standard-Einstellungen
#──────────────────────────────────────────────
defaults
    log     global
    mode    tcp                  # TCP-Modus ist für Minecraft/Velocity notwendig
    option  tcplog
    option  dontlognull
    timeout connect  5s
    timeout client   60s
    timeout server   60s
    retries 3

#──────────────────────────────────────────────
# Stats-Dashboard (intern, Port 8404)
#──────────────────────────────────────────────
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    # WICHTIG: Dieses Passwort VOR dem Produktivbetrieb ändern!
    stats auth admin:changeme_stats_password
    stats realm "HAProxy Stats"

#──────────────────────────────────────────────
# Frontend – Eingehende Spieler-Verbindungen (Port 25565)
# Leitet direkt an den Velocity-Proxy weiter.
#──────────────────────────────────────────────
frontend minecraft_frontend
    bind *:25565
    default_backend velocity_backend

#──────────────────────────────────────────────
# Backend – Velocity Proxy Instanzen
# Health-Check alle 2 Sekunden; bei Ausfall wird der Standby aktiviert.
# Für mehrere Velocity-Instanzen (Hochverfügbarkeit) können hier mehrere
# Server eingetragen werden.
#──────────────────────────────────────────────
backend velocity_backend
    balance roundrobin
    option  tcp-check

    # Velocity-Hauptinstanz
    server  velocity-primary   172.20.0.3:25577  check  inter 2s  fall 3  rise 2

    # Optionale zweite Velocity-Instanz (für HA-Setup, auskommentiert)
    # server  velocity-secondary 172.20.0.4:25577  check  inter 2s  fall 3  rise 2  backup
