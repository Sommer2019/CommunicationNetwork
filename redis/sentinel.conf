# =============================================================================
# Redis Sentinel – sentinel.conf  (deploy on BOTH nodes)
# =============================================================================
# Sentinel provides automated master-election without manual intervention.
# With two nodes you need at least one sentinel on each node for quorum.
# Quorum = 1 means one sentinel vote is enough – acceptable for 2-node setups.
#
# Place at: /etc/redis/sentinel.conf   on both Node A and Node B
# Start:    redis-sentinel /etc/redis/sentinel.conf
#           (or: systemctl enable --now redis-sentinel)
# =============================================================================

port 26379
daemonize yes
logfile /var/log/redis/sentinel.log
pidfile /var/run/redis/sentinel.pid
dir /tmp

# ── Monitor the master ───────────────────────────────────────────────────────
# sentinel monitor <name> <master-ip> <master-port> <quorum>
sentinel monitor minecraft-master 192.168.1.101 6379 1

# Password for the monitored master (and replica after promotion)
sentinel auth-pass minecraft-master CHANGE_ME_STRONG_REDIS_PASSWORD

# After how many milliseconds the master is considered down
sentinel down-after-milliseconds minecraft-master 3000    # 3 seconds

# How many replicas may be reconfigured in parallel during failover
sentinel parallel-syncs minecraft-master 1

# Failover timeout in milliseconds
sentinel failover-timeout minecraft-master 10000   # 10 seconds

# Notification script called on any Sentinel event (optional)
# sentinel notification-script minecraft-master /etc/redis/sentinel-notify.sh
