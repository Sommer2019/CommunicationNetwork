# Redis Konfiguration – Minecraft Seamless Failover
# Speichert Spieler-State (Inventar, Position, XP) in Echtzeit
# Dokumentation: https://redis.io/docs/manual/config/

# ─────────────────────────────────────────────
# Netzwerk
# ─────────────────────────────────────────────

# Nur im internen Docker-Netz erreichbar
bind 0.0.0.0
port 6379
protected-mode yes

# Passwort-Authentifizierung (in Produktion unbedingt setzen!)
# requirepass changeme_redis_password

# ─────────────────────────────────────────────
# Persistenz
# Redis schreibt Snapshots auf die Festplatte, damit nach einem Neustart
# die Spielerdaten noch vorhanden sind.
# ─────────────────────────────────────────────

# RDB Snapshot: Alle 60s wenn mind. 1 Key geändert wurde
save 60 1
# Alle 300s wenn mind. 10 Keys geändert wurden
save 300 10

# AOF (Append-Only File) für maximale Datensicherheit
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec        # Kompromiss zwischen Performance und Sicherheit

# Dateipfad für RDB/AOF
dir /data
dbfilename dump.rdb

# ─────────────────────────────────────────────
# Speicher-Limits
# ─────────────────────────────────────────────

# Maximaler Speicherverbrauch
maxmemory 512mb

# Strategie bei Speicherüberschreitung: LRU auf volatile Keys
maxmemory-policy volatile-lru

# ─────────────────────────────────────────────
# Verbindungen
# ─────────────────────────────────────────────

# Maximale gleichzeitige Verbindungen
maxclients 100

# Timeout für inaktive Verbindungen (0 = kein Timeout)
timeout 0

# TCP-Keepalive (Sekunden)
tcp-keepalive 300

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
loglevel notice
logfile ""
