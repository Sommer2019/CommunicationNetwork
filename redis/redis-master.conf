# =============================================================================
# Redis – Master configuration (Node A)
# =============================================================================
# Version:  Redis 7.x
# Role:     Primary / Master  –  receives all writes
# Place at: /etc/redis/redis-master.conf  (or replace /etc/redis/redis.conf)
#
# Player metadata written to Redis:
#   - Player position        (key: player:<uuid>:position)
#   - Player inventory       (key: player:<uuid>:inventory)
#   - Player health/food     (key: player:<uuid>:stats)
#   - Server session data    (key: player:<uuid>:session)
#
# The replica on Node B gets all writes in real-time via async replication.
# =============================================================================

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Authentication (REQUIRED in production)
requirepass CHANGE_ME_STRONG_REDIS_PASSWORD

# Persistence
# Use AOF for the lowest data-loss risk (1-second granularity)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Also keep RDB snapshots as a fallback
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /var/lib/redis

# Replication: announce this node's real IP so replicas can reconnect after
# the VIP moves.  Use the physical IP, NOT the Floating-IP.
replica-announce-ip   192.168.1.101
replica-announce-port 6379

# Performance
maxmemory 512mb
maxmemory-policy allkeys-lru
hz 20

# Logging
loglevel notice
logfile /var/log/redis/redis-master.log

# TLS (optional but recommended for production)
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file  /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
