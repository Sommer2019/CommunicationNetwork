# =============================================================================
# Redis – Recommended Plugins for Minecraft Player-Data Synchronisation
# =============================================================================
# The plugins below use Redis (or MySQL) to keep player inventory, position,
# and other metadata synchronised across multiple backend servers so that a
# player lands with the correct data regardless of which node serves them.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ Plugin                │ What it syncs           │ Redis / DB support     │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ HuskSync              │ Inventory, ender chest,  │ Redis + MySQL/MariaDB  │
# │ (William278)          │ XP, advancements,        │ (recommended)          │
# │                       │ potion effects, location │                        │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ MySQLInventoryBridge  │ Inventory + XP           │ MySQL only             │
# │ (GeorgeV8)            │                          │                        │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ RedisEconomy          │ Economy balances          │ Redis                  │
# ├──────────────────────────────────────────────────────────────────────────┤
# │ RedisBungee / Velocity│ Player session (online   │ Redis                  │
# │ Redis                 │ list, server routing)    │                        │
# └──────────────────────────────────────────────────────────────────────────┘
#
# RECOMMENDATION: Use HuskSync – it is actively maintained, supports Redis
# as the primary sync channel (fast publish/subscribe), and falls back to
# MySQL for persistent storage.  It handles the "data lock" problem
# (preventing duplicate-write races) via a per-player mutex stored in Redis.
# =============================================================================

# =============================================================================
# HuskSync – config.yml snippet
# File location on each Paper backend: plugins/HuskSync/config.yml
# =============================================================================

server:
  name: "node-a-survival"   # unique name per backend server

database:
  type: MYSQL
  mysql:
    host: 127.0.0.1          # or a shared MySQL host / Galera cluster
    port: 3306
    database: husksync
    username: husksync
    password: CHANGE_ME
    connection_pool:
      maximum_pool_size: 10
      minimum_idle: 2
      connection_timeout: 20000

redis:
  host: 127.0.0.1            # Redis on the same node; Sentinel-aware clients
  port: 6379                  # will transparently follow the master
  password: "CHANGE_ME_STRONG_REDIS_PASSWORD"
  use_ssl: false

sync:
  # Synchronise the following data types
  inventory: true
  ender_chest: true
  experience: true
  advancements: true
  statistics: true
  potion_effects: true
  game_mode: true
  persistent_data_container: true

  # How long (seconds) to hold a "data lock" while syncing.
  # Must be shorter than your keepalived failover window.
  lock_duration: 3

  # Where to save on quit – SERVER writes to DB immediately
  save_on_world_save: true
  save_on_death: true
