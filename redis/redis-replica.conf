# =============================================================================
# Redis – Replica configuration (Node B)
# =============================================================================
# Version:  Redis 7.x
# Role:     Replica  –  receives all writes from the master asynchronously.
#           Read-only by default; becomes writable ONLY after a manual
#           REPLICAOF NO ONE (handled by scripts/failover.sh).
# Place at: /etc/redis/redis-replica.conf  (or replace /etc/redis/redis.conf)
# =============================================================================

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Authentication
requirepass CHANGE_ME_STRONG_REDIS_PASSWORD
masterauth  CHANGE_ME_STRONG_REDIS_PASSWORD   # must match master's requirepass

# ── Replication ──────────────────────────────────────────────────────────────
# Point to Node A's physical IP (NOT the Floating-IP so replication continues
# to work even if the VIP is not on Node A at the moment).
replicaof 192.168.1.101 6379

# Keep the replica read-only so nothing accidentally writes to it
replica-read-only yes

# Serve stale data while re-syncing (avoids brief data gaps during reconnect)
replica-serve-stale-data yes

# Persistence (same as master – required to promote this node to master)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /var/lib/redis

# Announce real IP (used by Sentinel / clients for auto-discovery)
replica-announce-ip   192.168.1.102
replica-announce-port 6379

# Performance
maxmemory 512mb
maxmemory-policy allkeys-lru
hz 20

# Logging
loglevel notice
logfile /var/log/redis/redis-replica.log
