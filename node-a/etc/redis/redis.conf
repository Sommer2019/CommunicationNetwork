# =============================================================================
# Redis – Master  (Node A)
# Values were substituted from config.env by deploy.sh
# =============================================================================

bind 0.0.0.0
protected-mode yes
port @@REDIS_PORT@@
requirepass @@REDIS_PASSWORD@@

# Persistence – AOF for minimal data loss, RDB as fallback
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /var/lib/redis

# Tell replicas the real (physical) IP of this node so they can reconnect
# after the VIP moves – do NOT use the Floating-IP here.
replica-announce-ip   @@NODE_A_IP@@
replica-announce-port @@REDIS_PORT@@

maxmemory 512mb
maxmemory-policy allkeys-lru
hz 20
loglevel notice
logfile /var/log/redis/redis.log
