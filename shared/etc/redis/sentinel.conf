# =============================================================================
# Redis Sentinel – deploy on BOTH Node A and Node B
# =============================================================================
# Values are substituted from config.env by deploy.sh
# =============================================================================

port 26379
daemonize yes
logfile /var/log/redis/sentinel.log
pidfile /var/run/redis/sentinel.pid
dir /tmp

sentinel monitor minecraft-master @@NODE_A_IP@@ @@REDIS_PORT@@ 1
sentinel auth-pass  minecraft-master @@REDIS_PASSWORD@@

# Declare master dead after 3 s of no heartbeat
sentinel down-after-milliseconds minecraft-master 3000

# Reconfigure one replica at a time during failover
sentinel parallel-syncs minecraft-master 1

# Failover timeout
sentinel failover-timeout minecraft-master 10000
