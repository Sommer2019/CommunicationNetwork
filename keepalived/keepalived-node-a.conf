# =============================================================================
# Keepalived configuration – Node A (MASTER)
# =============================================================================
# Install: apt install keepalived
# Place at: /etc/keepalived/keepalived.conf on Node A
#
# Floating-IP (VIP):  203.0.113.10   ← players always connect to this IP
# Node A (real IP):   192.168.1.101
# Node B (real IP):   192.168.1.102
#
# How it works:
#   Node A starts as MASTER and announces the VIP via VRRP.
#   If Node A's health-check fails or the machine goes down, Node B
#   (priority 90) wins the election and takes over the VIP within ~2 s.
# =============================================================================

global_defs {
    router_id MINECRAFT_HA
    # Send alerts to your ops e-mail (optional)
    notification_email {
        ops@example.com
    }
    notification_email_from keepalived@node-a.example.com
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
}

# ---------------------------------------------------------------------------
# Health-check: verify that the Minecraft / Velocity process is alive
# ---------------------------------------------------------------------------
vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 2          # run every 2 seconds
    weight   -20        # subtract 20 from priority when the check fails
    fall     2          # require 2 consecutive failures before acting
    rise     2          # require 2 consecutive successes to recover
}

# ---------------------------------------------------------------------------
# Quorum check: consult the Witness server before holding the MASTER role.
# Prevents split-brain when Node A and Node B lose their private link but
# both still have internet connectivity.
# A failed quorum check subtracts 30 from priority (110 → 80), which is
# below Node B's base priority (90), so Node B wins the election.
# ---------------------------------------------------------------------------
vrrp_script chk_quorum {
    script "/etc/keepalived/quorum-check.sh"
    interval 2
    weight   -30        # must push this node below Node B's base priority
    fall     1          # one failure is enough to yield (fast response)
    rise     2
}

# ---------------------------------------------------------------------------
# VRRP instance – one per public NIC
# ---------------------------------------------------------------------------
vrrp_instance MINECRAFT_VIP {
    state  MASTER           # Node A starts as MASTER
    interface eth0          # change to your public NIC (ip a)
    virtual_router_id 51    # must be identical on Node A and Node B (1–255)
    priority  110           # higher wins; Node B must use a lower value (e.g. 90)
    advert_int 1            # VRRP advertisement interval in seconds

    authentication {
        auth_type PASS
        auth_pass MinecraftHA2024   # change to a strong secret; same on both nodes
    }

    virtual_ipaddress {
        203.0.113.10/32 dev eth0    # the Floating-IP players connect to
    }

    track_script {
        chk_minecraft
        chk_quorum
    }

    # Optional: run scripts on state transitions
    notify_master  "/etc/keepalived/on_master.sh"
    notify_backup  "/etc/keepalived/on_backup.sh"
    notify_fault   "/etc/keepalived/on_fault.sh"
}
