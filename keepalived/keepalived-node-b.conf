# =============================================================================
# Keepalived configuration – Node B (BACKUP)
# =============================================================================
# Install: apt install keepalived
# Place at: /etc/keepalived/keepalived.conf on Node B
#
# Floating-IP (VIP):  203.0.113.10
# Node A (real IP):   192.168.1.101
# Node B (real IP):   192.168.1.102
# =============================================================================

global_defs {
    router_id MINECRAFT_HA
    notification_email {
        ops@example.com
    }
    notification_email_from keepalived@node-b.example.com
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
}

vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 2
    weight   -20
    fall     2
    rise     2
}

vrrp_instance MINECRAFT_VIP {
    state  BACKUP           # Node B starts as BACKUP
    interface eth0
    virtual_router_id 51    # must match Node A exactly
    priority  90            # lower than Node A's 110
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass MinecraftHA2024   # must match Node A exactly
    }

    virtual_ipaddress {
        203.0.113.10/32 dev eth0
    }

    track_script {
        chk_minecraft
    }

    notify_master  "/etc/keepalived/on_master.sh"
    notify_backup  "/etc/keepalived/on_backup.sh"
    notify_fault   "/etc/keepalived/on_fault.sh"
}
