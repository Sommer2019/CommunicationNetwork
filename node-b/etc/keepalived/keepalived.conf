# =============================================================================
# Keepalived – Node B  (BACKUP)
# Values were substituted from config.env by deploy.sh
# =============================================================================

global_defs {
    router_id MINECRAFT_HA
    notification_email { @@OPS_EMAIL@@ }
    notification_email_from keepalived@node-b
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
}

vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 2
    weight   -20
    fall     2
    rise     2
}

vrrp_script chk_quorum {
    script "/etc/keepalived/quorum-check.sh"
    interval 2
    weight   -30   # 90 - 30 = 60 → still wins if Node A is fully dead
    fall     1
    rise     2
}

vrrp_instance MINECRAFT_VIP {
    state     BACKUP
    interface @@NIC@@
    virtual_router_id @@VRRP_ROUTER_ID@@
    priority  @@NODE_B_PRIORITY@@
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass @@VRRP_AUTH_PASS@@
    }

    virtual_ipaddress {
        @@FLOATING_IP@@/32 dev @@NIC@@
    }

    track_script {
        chk_minecraft
        chk_quorum
    }

    notify_master "/etc/keepalived/on_master.sh"
    notify_backup "/etc/keepalived/on_backup.sh"
    notify_fault  "/etc/keepalived/on_fault.sh"
}
