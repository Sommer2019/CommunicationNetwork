# =============================================================================
# Redis – Replica  (Node B)
# Values were substituted from config.env by deploy.sh
# =============================================================================

bind 0.0.0.0
protected-mode yes
port @@REDIS_PORT@@
requirepass @@REDIS_PASSWORD@@
masterauth  @@REDIS_PASSWORD@@

# Replicate from Node A's physical IP (NOT the Floating-IP)
replicaof @@NODE_A_IP@@ @@REDIS_PORT@@

# Stay read-only until promoted by Sentinel or redis-promote.sh
replica-read-only yes
replica-serve-stale-data yes

# Persistence (needed to promote this node to master without data loss)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /var/lib/redis

replica-announce-ip   @@NODE_B_IP@@
replica-announce-port @@REDIS_PORT@@

maxmemory 512mb
maxmemory-policy allkeys-lru
hz 20
loglevel notice
logfile /var/log/redis/redis.log
